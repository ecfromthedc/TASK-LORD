<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>TASK LORD</title>
<style>
  :root{
    --bg:#0a0a0c; --bg-2:#0c0c10;
    --surface:#121216; --surface-hi:#17171c;
    --line:rgba(236,231,221,.07); --line-hi:rgba(236,231,221,.14);
    --ink:#ece9e1; --ink-mid:#9b988e; --ink-lo:#615e57; --ink-faint:#46443e;
    --accent:#c8ad7c; --accent-dim:#8f7d59;
    --st-backlog:#54524b; --st-prog:#c8ad7c; --st-blocked:#b06a5f; --st-done:#5f7367;
    --urgent:#c77b63;
    --mono:ui-monospace,"SF Mono",SFMono-Regular,Menlo,monospace;
    --sans:ui-sans-serif,-apple-system,BlinkMacSystemFont,"Inter","Segoe UI",sans-serif;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0;color:var(--ink);font-family:var(--sans);font-size:13px;line-height:1.5;
    background:linear-gradient(180deg,#0b0b0e,var(--bg) 40%);
    -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;
  }
  ::selection{background:rgba(200,173,124,.25)}

  /* ---- masthead ---- */
  header{position:sticky;top:0;z-index:20;display:flex;align-items:center;gap:28px;
    padding:18px 30px 16px;background:linear-gradient(180deg,rgba(10,10,12,.96),rgba(10,10,12,.7));
    backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
  .brand{font-size:13px;letter-spacing:.52em;font-weight:600;text-transform:uppercase;
    color:var(--ink);white-space:nowrap}
  .brand b{color:var(--accent);font-weight:600}
  .stat{font-family:var(--mono);font-size:10.5px;color:var(--ink-lo);letter-spacing:.04em;white-space:nowrap}
  .stat .live{color:var(--accent-dim)}
  .grow{flex:1}
  .search{appearance:none;background:var(--surface);border:1px solid var(--line);
    color:var(--ink);font-family:var(--sans);font-size:12px;padding:7px 12px;border-radius:6px;
    width:200px;outline:none;transition:border-color .15s,width .2s}
  .search::placeholder{color:var(--ink-faint)}
  .search:focus{border-color:var(--line-hi);width:240px}
  .toggles{display:flex;gap:18px;align-items:center}
  .tg{font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-faint);
    cursor:pointer;user-select:none;padding-bottom:3px;border-bottom:1px solid transparent;transition:.15s}
  .tg:hover{color:var(--ink-mid)}
  .tg.on{color:var(--ink);border-bottom-color:var(--accent)}

  /* ---- area rail ---- */
  .rail{display:flex;gap:22px;padding:11px 30px;border-bottom:1px solid var(--line);
    overflow-x:auto;scrollbar-width:none}
  .rail::-webkit-scrollbar{display:none}
  .area{font-size:11px;letter-spacing:.04em;color:var(--ink-faint);cursor:pointer;
    white-space:nowrap;transition:.15s}
  .area .n{font-family:var(--mono);font-size:10px;color:var(--ink-faint);margin-left:6px}
  .area:hover{color:var(--ink-mid)}
  .area.on{color:var(--ink)} .area.on .n{color:var(--accent-dim)}

  /* ---- board ---- */
  .board{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--line);
    border-bottom:1px solid var(--line)}
  @media(max-width:1080px){.board{grid-template-columns:1fr 1fr}}
  @media(max-width:640px){.board{grid-template-columns:1fr}}
  .col{background:var(--bg);min-height:60vh;padding:0 0 40px;min-width:0}
  .col-h{position:sticky;top:71px;z-index:10;display:flex;align-items:baseline;gap:10px;
    padding:16px 22px 12px;background:var(--bg);border-top:2px solid var(--ch);
    margin-bottom:2px}
  .col-h .t{font-size:10.5px;letter-spacing:.2em;text-transform:uppercase;color:var(--ink-mid)}
  .col-h .n{font-family:var(--mono);font-size:10.5px;color:var(--ink-lo);margin-left:auto}
  .col.backlog{--ch:var(--st-backlog)} .col.in_progress{--ch:var(--st-prog)}
  .col.blocked{--ch:var(--st-blocked)} .col.done{--ch:var(--st-done)}
  .stack{display:flex;flex-direction:column;gap:10px;padding:0 16px;min-width:0}

  /* ---- card ---- */
  .card{position:relative;background:var(--surface);border:1px solid var(--line);
    border-radius:5px;padding:13px 15px 13px 17px;transition:background .15s,border-color .15s;min-width:0}
  .card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:2px;
    background:var(--sp);border-radius:5px 0 0 5px;opacity:.85}
  .card.s-backlog{--sp:var(--st-backlog)} .card.s-in_progress{--sp:var(--st-prog)}
  .card.s-blocked{--sp:var(--st-blocked)} .card.s-done{--sp:var(--st-done)}
  .card:hover{background:var(--surface-hi);border-color:var(--line-hi)}

  .eyebrow{display:flex;align-items:center;flex-wrap:wrap;gap:7px;margin-bottom:7px;
    font-size:10px;letter-spacing:.11em;text-transform:uppercase;color:var(--ink-lo);min-height:12px}
  .eyebrow .ident{font-family:var(--mono);letter-spacing:.06em;color:var(--ink-faint)}
  .eyebrow .sep{color:var(--ink-faint);opacity:.55}
  .eyebrow .prio.urgent{color:var(--urgent)} .eyebrow .prio.high{color:var(--accent)}

  .title{font-size:13.5px;font-weight:600;color:var(--ink);letter-spacing:.005em;
    margin-bottom:5px;word-break:break-word}
  .summary{font-size:12px;color:var(--ink-mid);margin-bottom:2px}
  .line{font-size:11.5px;margin-top:6px;color:var(--ink-mid)}
  .line .k{font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-lo);margin-right:7px}
  .line.blocked .k{color:var(--st-blocked)}
  .line.next .k{color:var(--accent-dim)}

  .gutter{display:flex;gap:14px;margin-top:11px;font-family:var(--mono);font-size:10px;
    color:var(--ink-faint);letter-spacing:.02em}
  .path{font-family:var(--mono);font-size:10px;color:var(--ink-faint);margin-top:7px;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;opacity:.7}

  .act{display:flex;align-items:center;width:100%;margin-top:12px;padding-top:11px;
    border-top:1px solid var(--line);background:none;border-left:none;border-right:none;
    border-bottom:none;cursor:pointer;color:var(--ink-mid);font-family:var(--sans);
    font-size:11.5px;letter-spacing:.02em;text-align:left;transition:color .15s}
  .act .arrow{margin-left:auto;color:var(--ink-faint);transition:transform .15s,color .15s}
  .card:hover .act{color:var(--ink)}
  .card:hover .act .arrow{color:var(--accent);transform:translateX(3px)}

  .dismiss{position:absolute;top:9px;right:10px;width:18px;height:18px;display:flex;
    align-items:center;justify-content:center;cursor:pointer;color:var(--ink-faint);
    font-size:15px;line-height:1;opacity:0;transition:.15s;background:none;border:none;font-family:var(--sans)}
  .card:hover .dismiss{opacity:.7}
  .dismiss:hover{opacity:1;color:var(--st-blocked)}

  .empty{color:var(--ink-faint);font-size:11px;letter-spacing:.04em;padding:14px 22px}

  footer{padding:18px 30px 26px;font-family:var(--mono);font-size:10px;color:var(--ink-faint);
    letter-spacing:.04em}

  #toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(14px);
    background:var(--surface-hi);border:1px solid var(--line-hi);color:var(--ink);
    padding:12px 18px;border-radius:7px;font-size:12px;max-width:540px;z-index:60;opacity:0;
    transition:opacity .2s,transform .2s;pointer-events:none;box-shadow:0 18px 50px rgba(0,0,0,.55)}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  #toast .em{color:var(--accent)}
  #toast .sub{color:var(--ink-mid)}
  code{font-family:var(--mono);font-size:11px;color:var(--accent-dim)}
</style>
</head>
<body>
<header>
  <span class="brand">Task <b>Lord</b></span>
  <span class="stat" id="stat">loading</span>
  <span class="grow"></span>
  <input class="search" id="search" placeholder="Filter" />
  <div class="toggles" id="toggles">
    <span class="tg on" data-src="session">Sessions</span>
    <span class="tg on" data-src="code">Code</span>
    <span class="tg on" data-src="business">Business</span>
    <span class="tg" data-staleonly="1">Stalled</span>
  </div>
</header>
<div class="rail" id="rail"></div>
<div class="board" id="board"></div>
<footer id="footer"></footer>
<div id="toast"></div>

<script src="board.js" onerror="window.__noboardjs=1"></script>
<script>
const COLS=[["backlog","Backlog"],["in_progress","In Progress"],["blocked","Blocked"],["done","Done"]];
let DATA={cards:[]};
const state={sources:new Set(["session","code","business"]),areas:new Set(),staleOnly:false,q:""};
const TOKEN=window.TASKLORD_TOKEN||null;

function esc(s){return (s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}
function idle(d){if(d==null)return"";if(d===0)return"today";if(d===1)return"1d idle";return d+"d idle";}

function cardHTML(c){
  const tok=[];
  if(c.identifier) tok.push(`<span class="ident">${esc(c.identifier)}</span>`);
  if(c.area) tok.push(`<span>${esc(c.area)}</span>`);
  if(c.type) tok.push(`<span>${esc(c.type)}</span>`);
  if(c.priority===1) tok.push(`<span class="prio urgent">Urgent</span>`);
  else if(c.priority===2) tok.push(`<span class="prio high">High</span>`);
  const eyebrow=`<div class="eyebrow">${tok.join('<span class="sep">·</span>')}</div>`;
  const summary=(c.left_off&&c.left_off!=="—")?`<div class="summary">${esc(c.left_off)}</div>`:"";
  const next=(c.next_step&&c.next_step!=="—")?`<div class="line next"><span class="k">Next</span>${esc(c.next_step)}</div>`:"";
  const blocked=c.blockers?`<div class="line blocked"><span class="k">Blocked</span>${esc(c.blockers)}</div>`:"";
  const g=[];
  if(c.days_idle!=null) g.push(`<span>${esc(idle(c.days_idle))||"today"}</span>`);
  if(c.git&&c.git.dirty) g.push(`<span>${c.git.dirty_count} uncommitted</span>`);
  const gutter=g.length?`<div class="gutter">${g.join("")}</div>`:"";
  const path=c.path?`<div class="path">${esc(c.path)}</div>`:"";
  const verb=c.source==="session"?"Continue in a fresh session":c.source==="business"?"Open in Trello":"Cook a fresh session";
  return `<div class="card s-${c.status}">
    <button class="dismiss" title="Dismiss — won't return" onclick='dismiss(${JSON.stringify(c.id)},event)'>×</button>
    ${eyebrow}
    <div class="title">${esc(c.label)}</div>
    ${summary}${next}${blocked}${gutter}${path}
    <button class="act" onclick='cook(${JSON.stringify(c.id)})'>${verb}<span class="arrow">→</span></button>
  </div>`;
}

function render(){
  const q=state.q.toLowerCase();
  const cards=DATA.cards.filter(c=>{
    if(!state.sources.has(c.source))return false;
    if(state.areas.size && !state.areas.has(c.area))return false;
    if(state.staleOnly && !c.stale)return false;
    if(q && !((c.label||"").toLowerCase().includes(q)||(c.left_off||"").toLowerCase().includes(q)||(c.next_step||"").toLowerCase().includes(q)||(c.path||"").toLowerCase().includes(q)||(c.type||"").toLowerCase().includes(q)))return false;
    return true;
  });
  document.getElementById("board").innerHTML=COLS.map(([k,t])=>{
    const list=cards.filter(c=>c.status===k);
    const inner=list.length?`<div class="stack">${list.map(cardHTML).join("")}</div>`:`<div class="empty">Clear</div>`;
    return `<section class="col ${k}"><div class="col-h"><span class="t">${t}</span><span class="n">${list.length}</span></div>${inner}</section>`;
  }).join("");
  document.getElementById("stat").innerHTML=`${cards.length} of ${DATA.total||DATA.cards.length} &nbsp; ${fmt(DATA.generated_at)} &nbsp; <span class="live">${TOKEN?"live":"read-only"}</span>`;
}

function fmt(iso){if(!iso)return"";try{return new Date(iso).toLocaleString(undefined,{month:"short",day:"numeric",hour:"numeric",minute:"2-digit"});}catch(e){return"";}}
function toast(html,ms=4600){const t=document.getElementById("toast");t.innerHTML=html;t.classList.add("show");clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove("show"),ms);}

function cook(id){
  const c=DATA.cards.find(x=>x.id===id);if(!c)return;
  if(TOKEN){
    fetch(`/cook?id=${encodeURIComponent(id)}&token=${encodeURIComponent(TOKEN)}`).then(r=>r.json()).then(r=>{
      if(!r.ok){toast("Couldn't dispatch — "+esc(r.error||"failed"));return;}
      toast(`<span class="em">${esc(r.action)}</span> &nbsp; ${esc(c.label)}<br><span class="sub">Directive copied to clipboard — paste into the session.</span>`);
    }).catch(()=>toast("Launchpad not reachable"));
  } else {
    const cmd=c.path?`cd ${c.path} && claude`:"(open Trello)";
    navigator.clipboard.writeText(cmd).then(()=>toast(`<span class="em">Command copied</span><br><span class="sub">${esc(cmd)} — run <code>tasklord serve</code> for one-click dispatch</span>`));
  }
}

function dismiss(id,ev){
  if(ev) ev.stopPropagation();
  const c=DATA.cards.find(x=>x.id===id);if(!c)return;
  if(!confirm(`Are you good on this task?\n\n${c.label}\n\nOK removes it for good — it won't return on future scans. Cancel keeps it.`))return;
  if(TOKEN){
    fetch(`/dismiss?id=${encodeURIComponent(id)}&token=${encodeURIComponent(TOKEN)}`).then(r=>r.json()).then(r=>{
      if(!r.ok){toast("Couldn't dismiss — "+esc(r.error||"failed"));return;}
      DATA.cards=DATA.cards.filter(x=>x.id!==id);render();
      toast(`<span class="em">Dismissed</span> &nbsp; ${esc(c.label)} won't return`);
    }).catch(()=>toast("Launchpad not reachable"));
  } else {DATA.cards=DATA.cards.filter(x=>x.id!==id);render();toast(`<span class="em">Hidden</span> <span class="sub">— serve the board to dismiss for good</span>`);}
}

function buildRail(){
  const wrap=document.getElementById("rail");const areas=DATA.areas||{};
  const keys=Object.keys(areas).filter(Boolean).sort((a,b)=>areas[b]-areas[a]);
  if(!keys.length){wrap.style.display="none";return;}
  wrap.style.display="flex";
  wrap.innerHTML=keys.map(a=>`<span class="area" data-area="${esc(a)}">${esc(a)}<span class="n">${areas[a]}</span></span>`).join("");
  wrap.onclick=e=>{const el=e.target.closest(".area");if(!el)return;const a=el.dataset.area;
    if(state.areas.has(a)){state.areas.delete(a);el.classList.remove("on");}else{state.areas.add(a);el.classList.add("on");}render();};
}

document.getElementById("toggles").addEventListener("click",e=>{
  const t=e.target.closest(".tg");if(!t)return;
  if(t.dataset.staleonly){state.staleOnly=!state.staleOnly;t.classList.toggle("on");}
  else{const s=t.dataset.src;if(state.sources.has(s)){state.sources.delete(s);t.classList.remove("on");}else{state.sources.add(s);t.classList.add("on");}}
  render();
});
document.getElementById("search").addEventListener("input",e=>{state.q=e.target.value;render();});

function boot(d){DATA=d;buildRail();render();
  document.getElementById("footer").textContent=`${d.total} tasks · ${Object.entries(d.counts||{}).map(([k,v])=>`${v} ${k.replace("_"," ")}`).join("  ·  ")}`;}
fetch("board.json?_="+Date.now()).then(r=>{if(!r.ok)throw 0;return r.json();}).then(boot)
  .catch(()=>{if(window.BOARD){boot(window.BOARD);return;}document.getElementById("board").innerHTML=`<div class="empty">No data — run <code>tasklord harvest</code>, then reload.</div>`;});
</script>
</body>
</html>
